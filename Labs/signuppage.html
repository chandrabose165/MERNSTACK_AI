<html>
<head>
<title>signup_page</title>
<style>
p{
background-color:lightblue;
font-size:30px;
padding: 5px;
text-align:center;
}
input{
padding-top:10px;
border-radius:5px;
text-align:center;
padding-bottom:5px;
}
input[type="submit"]{
    margin-right: 10px;
    padding: 8px;
    cursor: pointer;
}
input[type="submit"]:hover{
    border: none;
    box-shadow: 0px 0px 5px red;
}
input[type="reset"]{
    padding: 8px;
    cursor: pointer;
}
input[type="reset"]:hover{
    border: none;
    box-shadow: 0px 0px 5px red;
}
h1{
text-align:center;
}
</style>
</head>
<body>
<script>
function buttons(){
let name = document.getElementById("username").value;
let password = document.getElementById("pass").value;
let mobile = document.getElementById("mobile").value;

document.write("username:",name,"<br/>");
document.write("password:",password,"<br>");
document.write("mobile:",mobile);

}
</script>
<h1>Signup Form</h1>
<form target="_blank">
<p> Username: <input id="username" type="text" placeholder="username"/></p>
<p> Password: <input id="pass" type="password" placeholder="current-password"/></p>
<p> Mobile number : <input id="mobile" type = "number" placeholder="123456789"/></p>
<p> <input type="submit" onclick="buttons()" /> <input type="reset" /> </p>
</form>
</body>
</html>

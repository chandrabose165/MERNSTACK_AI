<html>
<head>
<title>Traffic Light</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
margin: 0;
padding: 0;
max-width: 100%;
max-height: 100%;
}
body{
background-color:rgb(253, 255, 253);
color: rosybrown;
background-color: aqua;
}
h1{
font-family:Arial, Helvetica, sans-serif;
text-align: center;
font-weight:bold;
margin: 20px 0px 0px 0px;
}
.container{
margin:50px 0px 0px 45% ;
background-color: rgb(109, 108, 108);
width: 150px;
height: 350px;
padding:5px 0px 0px 50px;
border-radius: 15px;
}
.div1{
margin-top: 8px;
width: 100px;
height: 100px;
border-radius: 50%;
background-color: red;
}
.div2{
margin-top: 15px;
width: 100px;
height: 100px;
border-radius: 50%;
background-color: orange
}
.div3{
margin-top: 15px;
width: 100px;
height: 100px;
border-radius: 50%;
background-color: green;
}
.stand{
background-color: rgb(109, 108, 108);
width: 50px;
height: 25%;
margin: 0px 0px 0px 50%;
border-radius: 1px;
}
</style>
</head>
<body>
<h1>TRAFFIC SIGNALS</h1>
<div class="container">
<div class="div1"></div>
<div class="div2"></div>
<div class="div3"></div>
</div>
<div class="stand"></div>
</body>
</html>
